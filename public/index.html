<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeskGame 服务入口</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 160px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        text-decoration: none;
      }

      a.secondary {
        background: #0f172a;
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DeskGame 已部署</h1>
      <p>
        这是 DeskGame 服务在 Vercel / Node 运行时下的公开入口页。HTTP API 保持在
        <code>/rooms</code> 与 <code>/api/admin/overview</code>，
        管理后台继续通过受鉴权保护的 <code>/admin/</code> 提供。
      </p>
      <p>
        如果你正在进行联调，可以直接从这里进入后台，或参考仓库中的 README 完成 Prisma /
        Vercel Storage 环境变量配置。
      </p>
      <div class="actions">
        <a href="/admin/">进入管理后台</a>
        <a class="secondary" href="https://github.com/sadofriod/deskgame#readme">查看部署说明</a>
      </div>
    </main>
  </body>
  </html>
